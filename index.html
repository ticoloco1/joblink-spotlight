<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>HASHPO – Creator Content Exchange on Polygon</title>
    <meta name="description" content="HASHPO is a decentralised content exchange where creators tokenise their work, trade shares, earn dividends, and connect with fans — all settled in USDC on Polygon." />
    <meta name="keywords" content="HASHPO, creator economy, content exchange, NFT, USDC, Polygon, shares, dividends, decentralised finance" />
    <meta name="author" content="HASHPO" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://hashpo.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HASHPO" />
    <meta property="og:title" content="HASHPO – Creator Content Exchange on Polygon" />
    <meta property="og:description" content="Tokenise your content, trade creator shares and earn dividends — all in USDC on Polygon." />
    <meta property="og:url" content="https://hashpo.com/" />
    <meta property="og:image" content="https://hashpo.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@HashPoCom" />
    <meta name="twitter:creator" content="@HashPoCom" />
    <meta name="twitter:title" content="HASHPO – Creator Content Exchange on Polygon" />
    <meta name="twitter:description" content="Tokenise your content, trade creator shares and earn dividends — all in USDC on Polygon." />
    <meta name="twitter:image" content="https://hashpo.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "HASHPO",
      "url": "https://hashpo.com",
      "description": "Decentralised creator content exchange built on Polygon.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://hashpo.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
